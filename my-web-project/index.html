<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เว็บไซต์ของฉัน</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; padding: 50px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #007bff; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>ยินดีต้อนรับสู่เว็บแรกของฉัน! 🚀</h1>
        <p>นี่คือเว็บไซต์ที่สร้างด้วย HTML และ CSS แบบง่ายๆ</p>
        <button onclick="alert('สวัสดีครับ!')">คลิกตรงนี้</button>
    </div>
</body>
</html>
